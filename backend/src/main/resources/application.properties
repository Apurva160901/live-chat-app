# ---- Application ----
spring.application.name=chat-backend
server.port=8080

# ---- PostgreSQL database connection ----
# (We'll start this database in a Docker container in a later step.)
spring.datasource.url=jdbc:postgresql://localhost:5434/chatdb
spring.datasource.username=chatuser
spring.datasource.password=chatpass

# ---- JPA / Hibernate (the ORM that maps Java objects <-> DB tables) ----
# ddl-auto=update : Hibernate creates/updates tables automatically from our entities.
#   Great for learning; in real production you'd use migrations (Flyway/Liquibase).
spring.jpa.hibernate.ddl-auto=update
# Show the SQL Hibernate runs, nicely formatted, so we can SEE what's happening.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---- JWT (login tokens) ----
# In real production this secret would come from an environment variable, NOT be committed.
jwt.secret=dev-only-secret-change-me-please-must-be-at-least-32-bytes-long-0123456789
jwt.expiration-ms=86400000

# ---- File uploads (profile pics / attachments) ----
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# Where uploaded files (avatars, attachments) are stored on disk.
app.upload-dir=uploads

# ---- Kafka (event-driven messaging) ----
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=chat-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.apurva.chat.kafka
spring.kafka.consumer.properties.spring.json.value.default.type=com.apurva.chat.kafka.ChatMessageEvent
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
# Don't crash startup if Kafka isn't reachable yet.
spring.kafka.listener.missing-topics-fatal=false
