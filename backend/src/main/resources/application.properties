# ---- Application ----
spring.application.name=chat-backend
server.port=8080

# ---- PostgreSQL database connection ----
# (We'll start this database in a Docker container in a later step.)
spring.datasource.url=jdbc:postgresql://localhost:5434/chatdb
spring.datasource.username=chatuser
spring.datasource.password=chatpass

# ---- JPA / Hibernate (the ORM that maps Java objects <-> DB tables) ----
# ddl-auto=update : Hibernate creates/updates tables automatically from our entities.
#   Great for learning; in real production you'd use migrations (Flyway/Liquibase).
spring.jpa.hibernate.ddl-auto=update
# Show the SQL Hibernate runs, nicely formatted, so we can SEE what's happening.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
