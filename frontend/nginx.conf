server {
    listen 80;

    # Serve the React app (single-page app: fall back to index.html).
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }

    # Proxy REST calls to the backend container.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Serve uploaded files (avatars, attachments) via the backend.
    location /uploads/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }

    # Proxy the WebSocket (needs the HTTP upgrade headers).
    location /ws/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
